name: Build apps and installers

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: Windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build tray app exe with PyInstaller
        working-directory: Windows
        run: pyinstaller itflow_quick_ticket.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ITFlowQuickTicket.iss'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itflow-quick-ticket-windows
          path: |
            Windows/dist/ITFlowQuickTicket.exe
            installer/Output/ITFlowQuickTicketSetup.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Windows/dist/ITFlowQuickTicket.exe
            installer/Output/ITFlowQuickTicketSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-gi gir1.2-appindicator3-0.1 scrot

      - name: Install Python dependencies
        working-directory: Linux
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build binary with PyInstaller
        working-directory: Linux
        run: pyinstaller itflow_quick_ticket.spec

      - name: Package release bundle
        working-directory: Linux
        run: |
          mkdir -p package
          cp dist/ITFlowQuickTicket package/
          cp install.sh itflow-quick-ticket.desktop package/
          cp -r assets package/
          tar -czf itflow-quick-ticket-linux.tar.gz -C package .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itflow-quick-ticket-linux
          path: Linux/itflow-quick-ticket-linux.tar.gz

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Linux/itflow-quick-ticket-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: macOS
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app with PyInstaller
        working-directory: macOS
        run: pyinstaller itflow_quick_ticket.spec

      - name: Package release bundle
        working-directory: macOS
        run: |
          mkdir -p package
          cp -R dist/ITFlowQuickTicket.app package/
          cp install.sh com.itflow.quickticket.plist package/
          cd package && zip -r ../itflow-quick-ticket-macos.zip .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itflow-quick-ticket-macos
          path: macOS/itflow-quick-ticket-macos.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: macOS/itflow-quick-ticket-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
